# GadKille monorepo — Render Blueprint (frontend static site)
# Backend: configure separately as a Web Service pointing to backend/
services:
  - type: web
    name: gadkille-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://api.gadkille.co.in/api
      - key: VITE_SITE_URL
        value: https://gadkille.co.in
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
